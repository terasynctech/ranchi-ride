<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - RanchiRide</title>
</head>
<body>

<h2>All Bookings</h2>
<div id="bookings"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("bookings").onSnapshot((snapshot) => {
  let html = "";
  snapshot.forEach((doc) => {
    let data = doc.data();
    html += `
      <div style="border:1px solid #000; padding:10px; margin:10px;">
        <p><b>Pickup:</b> ${data.pickup}</p>
        <p><b>Drop:</b> ${data.drop}</p>
        <p><b>Date:</b> ${data.datetime}</p>
        <p><b>Car:</b> ${data.car}</p>
        <p><b>Status:</b> ${data.status}</p>
        <button onclick="assignDriver('${doc.id}')">Assign Driver</button>
      </div>
    `;
  });
  document.getElementById("bookings").innerHTML = html;
});

function assignDriver(id){
  let driver = prompt("Enter Driver Name:");
  db.collection("bookings").doc(id).update({
    driver: driver,
    status: "Assigned"
  });
}
</script>

</body>
</html>
