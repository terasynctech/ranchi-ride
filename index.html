<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanchiRide - Book Taxi</title>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;}

header{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#000;color:#fff;padding:10px;
}
header img{height:45px;}

.hero{
  background:url('images/banner.png') no-repeat center;
  background-size:cover;height:280px;position:relative;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:white;text-align:center;
}
.hero::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.6);}
.hero h1,.hero p{position:relative;z-index:1;}

.section{padding:25px 15px;text-align:center;}

form{display:flex;flex-direction:column;align-items:center;}

input,select{
  width:90%;max-width:320px;padding:10px;margin:8px;
  border:1px solid #ccc;border-radius:5px;
}

.btn{
  background:#ffcc00;padding:12px;color:#000;font-weight:bold;
  border:none;border-radius:5px;width:90%;max-width:320px;cursor:pointer;
}

#price{color:#ffcc00;font-size:24px;margin:15px 0;}

.card{
  border:1px solid #ddd;margin:10px auto;padding:15px;
  width:90%;max-width:300px;cursor:pointer;transition:0.3s;
}
.card:hover{background:#ffcc00;}

footer{background:#000;color:#fff;padding:20px;text-align:center;}

.suggestions{
  width:90%;max-width:320px;background:#fff;border:1px solid #ddd;
}
.suggestions div{padding:8px;cursor:pointer;}
.suggestions div:hover{background:#f3f3f3;}

/* MAP MODAL */
#mapModal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000000cc;
  display:none;
  z-index:999;
}
#map{
  height:80%;
  width:100%;
}
.map-box{
  background:#fff;
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  text-align:center;
}

</style>
</head>

<body>

<header>
  <img src="images/logo.png">
  <div>
    <h3>RanchiRide</h3>
    <p>Book Taxi Anytime in Ranchi</p>
  </div>
</header>

<section class="hero">
  <h1>Book Your Ride in Ranchi</h1>
  <p>Airport | Local | Outstation</p>
</section>

<section class="section">
<h2>Book Your Ride</h2>

<form onsubmit="sendToWhatsApp(); return false;">

<input type="text" id="pickup" placeholder="Pickup" oninput="showSuggestions('pickup')" required>
<div id="pickup-list" class="suggestions"></div>

<button type="button" class="btn" onclick="useCurrentLocation()">📍 Use My Location</button>
<button type="button" class="btn" onclick="openMap('pickup')">🗺 Pick from Map</button>

<input type="text" id="drop" placeholder="Drop Location" oninput="showSuggestions('drop')" required>
<div id="drop-list" class="suggestions"></div>

<button type="button" class="btn" onclick="openMap('drop')">🗺 Pick Drop from Map</button>

<input type="datetime-local" id="datetime" required>

<select id="car" onchange="calculatePrice()">
<option value="12">Swift Dzire (₹12/km)</option>
<option value="16">Innova (₹16/km)</option>
<option value="22">Traveller (₹22/km)</option>
</select>

<input type="text" id="km" placeholder="Distance (KM)" readonly>

<input type="text" id="mobile" placeholder="Your Mobile Number" required>

<h3 id="price">Estimated Price: ₹0</h3>

<button class="btn">Book via WhatsApp</button>

</form>
</section>

<footer>
<p>📍 Ranchi</p>
<p>📞 +91 76338 01161</p>
</footer>

<!-- MAP MODAL -->
<div id="mapModal">
  <div id="map"></div>
  <div class="map-box">
    <button class="btn" onclick="confirmLocation()">Confirm Location</button>
    <button class="btn" onclick="closeMap()">Close</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let selectedField = "";
let map, marker;

// OPEN MAP
function openMap(field){
  selectedField = field;
  document.getElementById("mapModal").style.display = "block";

  setTimeout(()=>{
    map = L.map('map').setView([23.3441,85.3096], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click', function(e){
      if(marker) map.removeLayer(marker);
      marker = L.marker(e.latlng).addTo(map);
    });

  }, 300);
}

function closeMap(){
  document.getElementById("mapModal").style.display = "none";
  if(map){ map.remove(); }
}

// CONFIRM MAP LOCATION
async function confirmLocation(){
  if(!marker) return alert("Select a point");

  const lat = marker.getLatLng().lat;
  const lon = marker.getLatLng().lng;

  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const data = await res.json();

  document.getElementById(selectedField).value = data.display_name;

  closeMap();
  getDistance();
}

// SUGGESTIONS
async function showSuggestions(field){
  const input = document.getElementById(field).value;
  if(input.length < 3) return;

  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input}`);
  const data = await res.json();

  const list = document.getElementById(field+"-list");
  list.innerHTML = "";

  data.forEach(place=>{
    let div = document.createElement("div");
    div.innerText = place.display_name;
    div.onclick = ()=>{
      document.getElementById(field).value = place.display_name;
      list.innerHTML="";
      getDistance();
    };
    list.appendChild(div);
  });
}

// CURRENT LOCATION
function useCurrentLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data = await res.json();

    document.getElementById("pickup").value = data.display_name;
    getDistance();
  });
}

// DISTANCE
async function getDistance(){
  const pickup = document.getElementById("pickup").value;
  const drop = document.getElementById("drop").value;

  if(!pickup || !drop) return;

  const p = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${pickup}`);
  const d = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${drop}`);

  const pData = await p.json();
  const dData = await d.json();

  const pLat = pData[0].lat, pLon = pData[0].lon;
  const dLat = dData[0].lat, dLon = dData[0].lon;

  const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${pLon},${pLat};${dLon},${dLat}?overview=false`);
  const rData = await route.json();

  const km = rData.routes[0].distance / 1000;

  document.getElementById("km").value = km.toFixed(1);
  calculatePrice();
}

// PRICE
function calculatePrice(){
  let km = parseFloat(document.getElementById("km").value)||0;
  let rate = parseFloat(document.getElementById("car").value)||0;

  let total = 50 + (km*rate);

  document.getElementById("price").innerText = "Estimated Price: ₹"+Math.round(total);
}

// WHATSAPP
function sendToWhatsApp(){
  const pickup = document.getElementById("pickup").value;
  const drop = document.getElementById("drop").value;
  const km = document.getElementById("km").value;
  const price = document.getElementById("price").innerText;

  const msg = `🚖 RanchiRide Booking\nPickup: ${pickup}\nDrop: ${drop}\nDistance: ${km} KM\n${price}`;

  window.open("https://wa.me/917633801161?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
