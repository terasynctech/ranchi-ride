<!DOCTYPE html>
<html>
<head>
<title>Driver Dashboard</title>
</head>
<body>

<h2>Driver Rides</h2>
<input type="text" id="driverName" placeholder="Enter Your Name">
<button onclick="loadRides()">Load Rides</button>

<div id="rides"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadRides(){
  let name = document.getElementById("driverName").value;

  db.collection("bookings")
    .where("driver", "==", name)
    .onSnapshot((snapshot) => {
      let html = "";
      snapshot.forEach((doc) => {
        let data = doc.data();
        html += `
          <div style="border:1px solid #000; margin:10px; padding:10px;">
            <p>Pickup: ${data.pickup}</p>
            <p>Drop: ${data.drop}</p>
            <p>Date: ${data.datetime}</p>
          </div>
        `;
      });
      document.getElementById("rides").innerHTML = html;
    });
}
</script>

</body>
</html>
